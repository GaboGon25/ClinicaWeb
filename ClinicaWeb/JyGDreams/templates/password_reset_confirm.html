{% extends "layout.html" %}
{% load static %}

{% block title %}Nueva contraseña - JyGDreams{% endblock %}

{% block content %}
<div class="container py-5" style="max-width: 500px;">
  <h2 class="mb-4 text-center">Establecer nueva contraseña</h2>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Clave temporal</label>
      <input type="text" name="code" class="form-control" value="{{ code }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Nueva contraseña</label>
      <input type="password" name="password1" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Repetir nueva contraseña</label>
      <input type="password" name="password2" class="form-control" required>
    </div>
    <div class="d-grid">
      <button class="btn btn-success">Actualizar contraseña</button>
    </div>
  </form>
</div>
{% endblock %}
